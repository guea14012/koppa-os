name: Build KOPPA-OS ISO

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove Ubuntu security mirror from host
        run: |
          # live-build reads host sources and injects security.ubuntu.com into chroot
          # Remove it from the host first so live-build has nothing to inherit
          sudo rm -f /etc/apt/sources.list.d/ubuntu.sources \
                     /etc/apt/sources.list.d/ubuntu-security.list 2>/dev/null || true
          sudo sed -i '/security\.ubuntu\.com/d' /etc/apt/sources.list 2>/dev/null || true
          echo "deb http://deb.debian.org/debian bookworm main" | \
            sudo tee /etc/apt/sources.list.d/debian.list
          sudo apt-get update -qq

      - name: Install build dependencies
        run: |
          sudo apt-get install -y \
            live-build debootstrap xorriso \
            isolinux syslinux-common squashfs-tools \
            mtools dosfstools grub-pc-bin grub-efi-amd64-bin \
            curl wget python3-pip git
          pip3 install koppa-lang 2>/dev/null || true

      - name: Prepare KOPPA binaries
        run: |
          mkdir -p config/includes.chroot/usr/share/koppa
          mkdir -p config/includes.chroot/usr/bin

          pip3 install koppa-lang \
            --target config/includes.chroot/usr/share/koppa/lib \
            2>/dev/null || true

          if [ -f scripts/koppa-bin.sh ]; then
            cp scripts/koppa-bin.sh config/includes.chroot/usr/bin/koppa
            chmod +x config/includes.chroot/usr/bin/koppa
            cp config/includes.chroot/usr/bin/koppa \
               config/includes.chroot/usr/bin/apollo
          fi

      - name: Configure live-build
        run: |
          lb config \
            --distribution bookworm \
            --architecture amd64 \
            --archive-areas "main contrib non-free non-free-firmware" \
            --mirror-bootstrap "http://deb.debian.org/debian" \
            --mirror-chroot   "http://deb.debian.org/debian" \
            --mirror-binary   "http://deb.debian.org/debian" \
            --binary-images iso-hybrid \
            --debian-installer none \
            --security false

          # Inject correct Debian security source manually
          # (live-build on Ubuntu always falls back to security.ubuntu.com when --security=true)
          mkdir -p config/archives
          echo "deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware" \
            > config/archives/debian-security.list.chroot

      - name: Copy config overlay
        run: |
          cp -r config/package-lists/. config/package-lists/ 2>/dev/null || true
          cp -r config/hooks/.         config/hooks/          2>/dev/null || true

      - name: Build ISO
        run: sudo lb build 2>&1 | tee build.log | tail -80

      - name: Rename ISO
        run: |
          ISO=$(ls *.iso 2>/dev/null | head -1)
          if [ -n "$ISO" ]; then
            mv "$ISO" "koppa-os-$(date +%Y%m%d)-amd64.iso"
            ls -lh *.iso
          else
            echo "No ISO — build failed"; tail -100 build.log; exit 1
          fi

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: koppa-os-iso
          path: "*.iso"
          retention-days: 30
        if: always()

      - name: Upload build log on failure
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
        if: failure()

      - name: GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.iso"
          body: |
            ## KOPPA-OS ${{ github.ref_name }}
            **Base:** Debian 12 Bookworm · **Arch:** amd64

            ### Pre-installed
            - KOPPA v3.0.1 — Security-native DSL
            - nmap, Metasploit, Wireshark, Hydra, SQLmap, Hashcat
            - koppa-portscan, koppa-jwt-attack, koppa-webfuzz

            ### Quick Start
            ```bash
            koppa repl
            koppa pkg install koppa-portscan
            koppa-c2
            ```
