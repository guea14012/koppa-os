name: Build KOPPA-OS ISO

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Build ISO ────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install live-build & dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            live-build debootstrap xorriso squashfs-tools \
            isolinux syslinux-common syslinux-efi \
            grub-pc-bin grub-efi-amd64-bin grub-efi-amd64-signed \
            shim-signed mtools dosfstools \
            python3-pil python3-pip \
            rsync curl wget git

      - name: Set permissions
        run: |
          chmod +x config/hooks/*.hook.chroot
          chmod +x auto/config auto/build auto/clean

      - name: Copy KOPPA binaries
        run: |
          mkdir -p config/includes.chroot/usr/bin
          if [ -f scripts/koppa-bin.sh ]; then
            cp scripts/koppa-bin.sh config/includes.chroot/usr/bin/koppa
            chmod +x config/includes.chroot/usr/bin/koppa
          fi

      - name: Configure live-build
        run: sudo bash auto/config

      - name: Build ISO
        run: sudo lb build 2>&1 | tee build.log
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Package ISO
        id: pkg
        run: |
          ISO=$(ls *.iso 2>/dev/null | head -1)
          [ -z "$ISO" ] && { echo "No ISO — build failed"; tail -200 build.log; exit 1; }
          TAG="${GITHUB_REF_NAME:-dev}"
          NAME="koppa-os-${TAG}-amd64.iso"
          mv "$ISO" "$NAME"
          SHA=$(sha256sum "$NAME" | awk '{print $1}')
          echo "$SHA  $NAME" > "${NAME}.sha256"
          SIZE=$(du -sh "$NAME" | cut -f1)
          echo "name=$NAME"   >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA"  >> "$GITHUB_OUTPUT"
          echo "size=$SIZE"   >> "$GITHUB_OUTPUT"
          echo "Built: $NAME ($SIZE) SHA256=$SHA"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: koppa-os-iso
          path: |
            ${{ steps.pkg.outputs.name }}
            ${{ steps.pkg.outputs.name }}.sha256
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "KOPPA-OS ${{ github.ref_name }}"
          files: |
            ${{ steps.pkg.outputs.name }}
            ${{ steps.pkg.outputs.name }}.sha256
          body: |
            ## KOPPA-OS ${{ github.ref_name }}

            **Base:** Debian 12 Bookworm &nbsp;·&nbsp; **Arch:** amd64 &nbsp;·&nbsp; **Size:** ${{ steps.pkg.outputs.size }}

            ### Unique Features (vs Kali Linux)
            - **KOPPA Language** — security-native DSL with `net`, `inject`, `evasion`, `crypt`, `covert` modules
            - **KOPPA-C2** — HTTP/DNS C2 framework built into the OS with web operator dashboard
            - **KOPPA Package Manager** — 19 security modules written in KOPPA language
            - **Plymouth Boot Splash** — custom animated boot screen
            - **GRUB2 Theme** — dark red KOPPA branded bootloader

            ### Pre-installed Tools (50+)
            ```
            Network:    nmap · masscan · wireshark · hping3 · arp-scan · tcpdump
            Web:        sqlmap · nikto · gobuster · ffuf · nuclei · wfuzz · dirb
            Password:   hashcat · john · hydra · medusa · ncrack
            Exploit:    metasploit · searchsploit · crackmapexec · evil-winrm
            Recon:      amass · theHarvester · dnsrecon · sublist3r · enum4linux-ng
            Forensics:  binwalk · volatility3 · radare2 · steghide · exiftool
            Wireless:   aircrack-ng · reaver
            C2/Pivot:   koppa-c2 · socat · proxychains4 · tor · openvpn
            ```

            ### KOPPA Packages
            ```
            koppa-portscan · koppa-webfuzz · koppa-jwt-attack · koppa-hashcrack
            koppa-recon · koppa-exploit · koppa-evasion · koppa-bruteforce
            koppa-c2-client · koppa-sqli · koppa-xss · koppa-lfi · koppa-ssrf
            koppa-privesc · koppa-ad · koppa-network-map · koppa-api
            koppa-stealth · koppa-phish
            ```

            ### Quick Start
            ```bash
            # Flash to USB
            dd if=${{ steps.pkg.outputs.name }} of=/dev/sdX bs=4M status=progress

            # Boot → login: root / koppa

            koppa repl                          # Interactive KOPPA shell
            koppa pkg install koppa-exploit     # Install security module
            koppa-c2 0.0.0.0 8443               # Start C2 server
            ```

            ### SHA256
            ```
            ${{ steps.pkg.outputs.sha256 }}
            ```

            > **AUTHORIZED USE ONLY** — for penetration testing, CTF competitions, and security research on systems you own or have explicit written permission to test.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Deploy GitHub Pages ───────────────────────────────────────────────────────
  deploy-pages:
    runs-on: ubuntu-22.04
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: www/

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
