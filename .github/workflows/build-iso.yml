name: Build KOPPA-OS ISO

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Build ISO inside Debian Bookworm container (GitHub Actions handles pull+retry)
  build:
    runs-on: ubuntu-22.04
    container:
      image: debian:bookworm
      options: --privileged --cap-add=ALL
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install live-build & dependencies
        run: |
          apt-get update -qq
          apt-get install -y \
            live-build debootstrap xorriso squashfs-tools \
            grub-pc-bin grub-efi-amd64-bin \
            mtools dosfstools python3-pil python3-pip \
            rsync curl wget git ca-certificates procps
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Prepare workspace
        run: |
          chmod +x config/hooks/*.hook.chroot
          chmod +x auto/config auto/build auto/clean
          mkdir -p config/includes.chroot/usr/bin
          if [ -f scripts/koppa-bin.sh ]; then
            cp scripts/koppa-bin.sh config/includes.chroot/usr/bin/koppa
            chmod +x config/includes.chroot/usr/bin/koppa
          fi

      - name: Configure live-build
        run: bash auto/config

      - name: Build ISO
        run: lb build 2>&1 | tee build.log
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Package ISO
        id: pkg
        run: |
          ISO=$(ls *.iso 2>/dev/null | head -1)
          if [ -z "$ISO" ]; then
            echo "No ISO — build failed"
            tail -200 build.log
            exit 1
          fi
          TAG="${GITHUB_REF_NAME:-dev}"
          NAME="koppa-os-${TAG}-amd64.iso"
          mv "$ISO" "$NAME"
          SHA=$(sha256sum "$NAME" | awk '{print $1}')
          echo "$SHA  $NAME" > "${NAME}.sha256"
          SIZE=$(du -sh "$NAME" | cut -f1)
          echo "name=$NAME"   >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA"  >> "$GITHUB_OUTPUT"
          echo "size=$SIZE"   >> "$GITHUB_OUTPUT"
          echo "Built: $NAME ($SIZE) SHA256=$SHA"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: koppa-os-iso
          path: |
            ${{ steps.pkg.outputs.name }}
            ${{ steps.pkg.outputs.name }}.sha256
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Split ISO if over 2GB GitHub limit
        id: split
        run: |
          NAME="${{ steps.pkg.outputs.name }}"
          SIZE_BYTES=$(stat -c%s "$NAME")
          if [ "$SIZE_BYTES" -gt "1900000000" ]; then
            echo "ISO is $(du -sh $NAME | cut -f1), splitting for GitHub..."
            split -b 1900m "$NAME" "${NAME}.part"
            ls ${NAME}.part* | while read f; do echo "$f"; done
            echo "parts=$(ls ${NAME}.part* | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
            echo "split=true" >> "$GITHUB_OUTPUT"
          else
            echo "parts=$NAME" >> "$GITHUB_OUTPUT"
            echo "split=false" >> "$GITHUB_OUTPUT"
          fi

      - name: GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "KOPPA-OS ${{ github.ref_name }}"
          files: |
            ${{ steps.pkg.outputs.name }}.sha256
            ${{ steps.split.outputs.parts }}
          body: |
            ## KOPPA-OS ${{ github.ref_name }}

            **Base:** Debian 12 Bookworm &nbsp;·&nbsp; **Arch:** amd64 &nbsp;·&nbsp; **Size:** ${{ steps.pkg.outputs.size }}

            ### Login
            - **Autologin** → desktop อัตโนมัติ
            - Username: `koppa` / Password: `koppa`
            - Username: `root` / Password: `koppa`

            ### Pre-installed Tools (50+)
            ```
            Network:    nmap · masscan · wireshark · hping3 · tcpdump
            Web:        sqlmap · nikto · gobuster · ffuf · nuclei · wfuzz
            Password:   hashcat · john · hydra · medusa · ncrack
            Exploit:    metasploit · searchsploit · crackmapexec · evil-winrm
            Recon:      amass · theHarvester · dnsrecon · sublist3r
            Forensics:  binwalk · volatility3 · radare2 · steghide
            Wireless:   aircrack-ng · reaver
            C2/Pivot:   koppa-c2 · socat · proxychains4 · tor · openvpn
            ```

            ### Download & Boot
            ```bash
            # If split into parts, reassemble first:
            cat koppa-os-*.iso.part* > koppa-os-v1.1.0-amd64.iso

            # Flash to USB
            dd if=koppa-os-v1.1.0-amd64.iso of=/dev/sdX bs=4M status=progress

            # VirtualBox: New VM → Linux 64-bit Debian → Attach ISO → Boot
            # Login: koppa / koppa  (or autologin)
            # Install to disk: click "Install KOPPA-OS" on desktop
            ```

            ### SHA256
            ```
            ${{ steps.pkg.outputs.sha256 }}
            ```

            > **AUTHORIZED USE ONLY** — for pentesting, CTFs, and security research.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Deploy GitHub Pages ──────────────────────────────────────────────────────
  deploy-pages:
    runs-on: ubuntu-22.04
    needs: build
    if: github.ref == 'refs/heads/main'

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: www/

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
